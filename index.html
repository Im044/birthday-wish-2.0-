<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday My Wifey Sofi 🎂❤️</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #ffdde1 0%, #ee9ca7 30%, #1a1b2f 80%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #fff;
    }

    /* floating hearts background */
    .heart {
      position: absolute;
      width: 18px;
      height: 18px;
      background: rgba(255, 255, 255, 0.2);
      transform: rotate(45deg);
      animation: floatUp 12s linear infinite;
      border-radius: 4px;
    }
    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: 50%;
    }
    .heart::before {
      top: -50%;
    }
    .heart::after {
      left: -50%;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) rotate(45deg);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) rotate(45deg);
        opacity: 0;
      }
    }

    /* main card */
    .card {
      position: relative;
      width: min(900px, 95vw);
      background: rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      padding: 32px 24px;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 24px;
      overflow: hidden;
    }

    @media (max-width: 720px) {
      .card {
        grid-template-columns: 1fr;
        padding: 24px 18px 28px;
      }
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }

    .tagline {
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ffd1f7;
      opacity: 0;
      animation: fadeInDown 1s ease forwards 0.2s;
    }

    .headline {
      font-size: clamp(2rem, 3vw + 1rem, 3rem);
      line-height: 1.15;
      font-weight: 800;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.4);
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 1.1s ease forwards 0.4s;
    }

    .headline span.highlight {
      background: linear-gradient(120deg, #ff9a9e, #fecfef, #f6d365, #fda085);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sub {
      font-size: 0.98rem;
      color: #ffeefc;
      max-width: 520px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 1.1s ease forwards 0.6s;
    }

    .message-box {
      margin-top: 8px;
      background: rgba(0, 0, 0, 0.26);
      border-radius: 16px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      font-size: 0.94rem;
      line-height: 1.6;
      position: relative;
      overflow: hidden;
    }

    .message-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.18),
        transparent,
        rgba(255, 255, 255, 0.08)
      );
      opacity: 0;
      animation: shimmer 3.3s ease-in-out infinite 1.3s;
    }

    .signature {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #ffd6e8;
      text-align: right;
      font-style: italic;
    }

    .buttons {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn-main,
    .btn-ghost {
      border-radius: 999px;
      padding: 10px 22px;
      font-size: 0.92rem;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

      background: linear-gradient(135deg, #ff7eb3, #ff758c, #ffb199);
      color: #1a1b2f;
      box-shadow: 0 10px 25px rgba(255, 120, 171, 0.6);
